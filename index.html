<!DOCTYPE html>
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>JS Practise</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto+Mono" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Cabin+Sketch|Monoton|Orbitron|Poiret+One" rel="stylesheet">
    <style media="screen">
    body
    {
      overflow: hidden;
    }
      .pages
      {
        z-index: -1;
        width: 100;
        height: 5000px;

        position: relative;
        }
      .mydiv
      {
        background-image: url('hm.jpg');
        background-size: contain;
        margin-left: -8px;
        margin-top: -100px;
        z-index: -1;
        position: absolute;
        width: 100%;
        height: 5000px;
        opacity: 0.98;
        background-repeat: no-repeat;
        text-align: center;

      }
      .mydiv > div
      {
        display: none;
      }
      .mydiv >div:target
      {
        display: block;
      }
      .mydiv >div:target .mydiv>h1
      {
        display: none;
      }

      h1
      {
        font-family:'Poiret One', cursive;
        font-size: 60px;
        color: black;
        position: absolute;
        top: 60vh;
        left: 60vh;
        text-shadow: 5px 20px 10px gray;

      }
      nav
      {
        text-align: center;
        font-size: 20px;
        z-index: 1;
        font-weight: bolder;
        border-bottom: 2px solid lightgray;
      }
      nav ul li
      {
        display: inline-block;
        padding: 10px;
        border-radius: 35px 0;
        font-family:'Orbitron', sans-serif;
        cursor: pointer;
        color: white;
      }

      a
      {
        text-decoration: none;
        font-family:'Robot Mono',monospace;
        color: white;
      }

      li:hover
      {
        background-color: brown;
        opacity: 0.5;
      }
      .pageback
      {
        z-index: -1;
        width: 100%;
        margin-top:-60px;
        height: 1700px;
      }
      span
      {
        padding: 5px;
        font-size: 20px;
        color: white;
      }
      .markerfor
      {
        float:right;
        background-color: transparent;
        width: 50px;
        height: 50px;
        border:none;
        margin-right: 10px;
        background-image: url("for.png");
        background-repeat: no-repeat;
        background-size: contain;
        position: relative;
        border-radius: 22px;
        top:50vh;
      }
      .markerback
      {
        background-color:transparent;
        width: 50px;
        height: 50px;
        border:none;
        margin-left: 10px;
        border-radius: 22px;
        background-image: url("bac.png");
        background-repeat: no-repeat;
        background-size: contain;
        position: absolute;
        top: 50vh;
        left: 0;
      }
        .markerfor:hover
        {
          background-color: brown;
        }
        .markerback:hover
        {
          background-color: brown;
        }
        .hexa
        {
          background-color: white;
          opacity: 0.5;
          width: 80vw;
          z-index: 1;
          height: 80vh;
          box-shadow: 10px 20px 5px 0 gray;
          position: absolute;
          left: 200px;
          top:180px;
        }
        h3
        {
          font-family:'Poiret One', cursive;
          font-size: 40px;
          color: black;
          text-shadow: 5px 20px 8px gray;

        }
    </style>

  </head>
  <body>

    <nav>
      <ul>
        <li onclick="gotoPage(0)"><img src="home.png" alt="" /> Home </li><span>/</span>
        <li onclick="gotoPage(1)"><img src="student.png" alt="" /> About Me </li><span>/</span>
        <li onclick="gotoPage(2)"><img src="skills.png" alt="" /> Skills </li><span>/</span>
        <li onclick="gotoPage(3)"><img src="briefcase.png" alt="" /> Projects </li><span>/</span>
        <li onclick="gotoPage(4)"><img src="contacts.png" alt="" /> Contact </li>
      </ul>
    </nav>
    <div class="mydiv" id="home">
        <button type="button" class="markerfor" onclick="forward()" name="button"></button>
        <section class="hexa" id="hexahome">
            <h1><# Kartik Behl ></h1>
        </section>
        <div id="about" class="pages">
          <img class="pageback" src="skil.jpg" alt="" />
          <section class="hexa">
            <h3>About Me:</h3>
          </section>
          <button type="button" class="markerfor" onclick="forward()" name="button"></button>
          <button type="button" class="markerback" onclick="backward()"  name="button"></button>
        </div>

        <div id="skills" class="pages">
          <img class="pageback" src="proj.jpg" alt="" />
          <section class="hexa">
            <h3>Tech Skills:</h3>
          </section>
          <button type="button" class="markerfor" onclick="forward()" name="button"></button>
          <button type="button" class="markerback" onclick="backward()"  name="button"></button>

        </div>

        <div id="projects" class="pages">
          <img class="pageback" src="abt.jpg" alt="" />
          <section class="hexa">
              <h3>My Projects:</h3>
          </section>
          <button type="button" class="markerfor" onclick="forward()" name="button"></button>
          <button type="button" class="markerback" onclick="backward()"  name="button"></button>


        </div>

        <div id="contact" class="pages">
          <img class="pageback" src="cont.jpg" alt="" />
          <section class="hexa">
            <h3>Contact Me:</h3>
          </section>
          <button type="button" class="markerfor" onclick="forward()"  name="button"></button>
          <button type="button" class="markerback" onclick="backward()" name="button"></button>

        </div>
    </div>
    <script type="text/javascript">
      var num=0;
      var colorAr = ["brown","green","#661aff","#99e600","gray"];
      var divs = document.getElementsByTagName("div");
      var lists = document.getElementsByTagName("li");
      var hexahome = document.getElementById("hexahome");
      lists[0].style.background=colorAr[0];
      hexahome.style.display="block";
      function gotoPage(pageNum)
      {
        num=pageNum;
        for(var i=0;i<divs.length;i++)
        {
          if(i==0)
          {
            lists[i].style.background="";
          }
          else {
            lists[i].style.background="";
            divs[i].style.display="none";
          }
        }
        if(pageNum!=0)
        {
          hexahome.style.display="none";
        }
        lists[pageNum].style.background=colorAr[pageNum];
        divs[pageNum].style.display="block";

      }
      function forward()
      {
        for(var i=0;i<lists.length;i++)
        {
          lists[i].style.background="";
        }
        var cur = num;
        num++;
        if(num>4)
        {
          num=0;
          divs[cur].style.display="none";
          divs[0].style.display="block";
          hexahome.style.display="block";
          lists[0].style.background=colorAr[0];
        }
        else {
            hexahome.style.display="none";
          divs[num].style.display="block";
          lists[num].style.background=colorAr[num];
          if(cur!=0)
          divs[cur].style.display="none";
        }
      }
      function backward()
      {
        for(var i=0;i<lists.length;i++)
        {
          lists[i].style.background="";
        }
        var cur = num;
        num--;
        if(num<0)
        {
          hexahome.style.display="block";
          num=0;
          divs[0].style.display="block";
          lists[0].style.background=colorAr[0];
        }
        else {
          if(num==0)
          {
            hexahome.style.display="block"
          }
          else {
            hexahome.style.display="none";
          }
          divs[cur].style.display="none";
          lists[num].style.background=colorAr[num];
          divs[num].style.display="block";
        }
      }


        </script>
  </body>
</html>
